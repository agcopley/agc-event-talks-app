<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTalks 2026 - Single Track Event</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>TechTalks <span>2026</span></h1>
            <p>One Day. Six Talks. Infinite Inspiration.</p>
        </div>
    </header>

    <section class="search-section">
        <div class="container">
            <div class="search-wrapper">
                <input type="text" id="categorySearch" placeholder="Search categories (e.g. Backend, Cloud)...">
                <span class="search-icon">🔍</span>
            </div>
        </div>
    </section>

    <main class="container">
        <div id="schedule" class="schedule-grid">
            <!-- Schedule items will be injected here -->
            <div class="loading">Loading schedule...</div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 TechTalks Event. Built with Node.js & Passion.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
